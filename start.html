<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="智理校园" />
    <meta name="author" content="智理校园" />
    <title>从此开始 - 智理校园</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatability -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    
    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" style="position: absolute; top: 0; right: 0; width: 100%; z-index: 1000;">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">智理校园</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="index.html">主页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="start.html">从此开始</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Banner -->
    <div class="bg-blue-600 text-white py-4" style="background-color: #1E40AF; margin-top: 70px;">
        <div class="container px-5">
            <h1 class="text-center">Artificial Intelligence for campus</h1>
        </div>
    </div>

    <!-- Main Content -->
    <section class="py-5">
        <div class="container px-5">
            <div class="row">
                <!-- 左侧三分之二：格式审计模块 -->
                <div class="col-lg-8">
                    <div class="border rounded p-4 mb-0">
                        <h2>格式审计模块</h2>
                        
                        <!-- 论文文档上传区域 -->
                        <div class="border border-dashed p-5 text-center mb-4">
                            <p>请上传论文文档</p>
                            <input type="file" id="paper-upload" accept=".doc,.docx">
                        </div>
                        
                        <!-- 学校选择 -->
                        <div class="mb-4">
                            <label for="university-select">你来自：</label>
                            <select id="university-select" class="form-control">
                                <option value="">请选择学校</option>
                                <option value="北京大学">北京大学</option>
                                <option value="清华大学">清华大学</option>
                                <option value="中国人民大学">中国人民大学</option>
                                <option value="北京师范大学">北京师范大学</option>
                                <option value="北京理工大学">北京理工大学</option>
                                <option value="北京航空航天大学">北京航空航天大学</option>
                                <option value="北京科技大学">北京科技大学</option>
                                <option value="北京交通大学">北京交通大学</option>
                                <option value="北京邮电大学">北京邮电大学</option>
                                <option value="北京化工大学">北京化工大学</option>
                                <option value="中国农业大学">中国农业大学</option>
                                <option value="北京林业大学">北京林业大学</option>
                                <option value="北京中医药大学">北京中医药大学</option>
                                <option value="中国政法大学">中国政法大学</option>
                                <option value="华北电力大学">华北电力大学</option>
                                <option value="北京工业大学">北京工业大学</option>
                            </select>
                        </div>
                        
                        <!-- 是否有额外论文规范 -->
                        <div class="mb-4">
                            <label class="form-check-label" for="extra规范-toggle">是否有额外的论文规范</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="extra规范-toggle">
                            </div>
                        </div>
                        
                        <!-- 额外论文规范上传区域（默认隐藏） -->
                        <div id="extra规范-upload-area" class="border border-dashed p-5 text-center mb-4" style="display: none;">
                            <p>请上传论文规范</p>
                            <input type="file" id="extra规范-upload" accept=".doc,.docx,.pdf">
                        </div>
                        
                        <!-- 提交按钮 -->
                        <button id="submit-btn" class="btn btn-primary mb-4">提交</button>
                        
                        <!-- 结果生成区域 -->
                        <div class="border rounded p-4 mb-0">
                            <h3 id="result-title">待生成</h3>
                            <div id="result-content" style="display: none;">
                                <span id="generated-title"></span>
                                <a href="preview.html" id="preview-link" class="text-primary">预览</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧三分之一：文献溯源模块和逻辑审计模块 -->
                <div class="col-lg-4">
                    <!-- 文献溯源模块 -->
                    <div class="border rounded p-4 mb-0">
                        <h3>文献溯源模块</h3>
                        <div id="citation-result" class="p-2">
                            <!-- 待机界面 -->
                            <p>等待分析...</p>
                        </div>
                    </div>
                    
                    <!-- 逻辑审计模块 -->
                    <div class="border rounded p-4 mt-4 mb-0">
                        <h3>逻辑审计模块</h3>
                        <div id="logic-result" class="p-2">
                            <!-- 待机界面 -->
                            <p>等待分析...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div class="mb-2">许嘉杭、李泽宇、马海冀、闫澄、王灏曦</div>
            </div>
        </div>
    </footer>

    <script>
        // 额外论文规范上传区域的显示/隐藏
        const extra规范Toggle = document.getElementById('extra规范-toggle');
        const extra规范UploadArea = document.getElementById('extra规范-upload-area');
        
        if (extra规范Toggle && extra规范UploadArea) {
            extra规范Toggle.addEventListener('change', function() {
                if (this.checked) {
                    extra规范UploadArea.style.display = 'block';
                } else {
                    extra规范UploadArea.style.display = 'none';
                }
            });
        }
        
        // 提交按钮点击事件
        const submitBtn = document.getElementById('submit-btn');
        if (submitBtn) {
            submitBtn.addEventListener('click', function() {
                // 这里需要添加API调用代码
                // 1. 获取表单数据
                const paperFile = document.getElementById('paper-upload').files[0];
                const university = document.getElementById('university-select').value;
                const hasExtra规范 = document.getElementById('extra规范-toggle').checked;
                const extra规范File = hasExtra规范 ? document.getElementById('extra规范-upload').files[0] : null;
                
                // 2. 验证表单
                if (!paperFile) {
                    alert('请上传论文文档');
                    return;
                }
                if (!university) {
                    alert('请选择学校');
                    return;
                }
                
                // 3. 调用API
                // 注意：这里需要填写你的API密钥和工作流ID
                const API_KEY = 'YOUR_API_KEY_HERE'; // 替换为你的API密钥
                const WORKFLOW_ID = 'YOUR_WORKFLOW_ID_HERE'; // 替换为你的工作流ID
                const API_URL = `https://api.dify.ai/v1/workflows/${WORKFLOW_ID}/run`;
                
                // 构建请求数据
                const formData = new FormData();
                formData.append('paper', paperFile);
                formData.append('university', university);
                formData.append('has_extra规范', hasExtra规范);
                if (hasExtra规范 && extra规范File) {
                    formData.append('extra规范', extra规范File);
                }
                
                // 发送请求
                fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    // 处理响应
                    console.log('API响应:', data);
                    
                    // 更新结果区域
                    const resultTitle = document.getElementById('result-title');
                    const resultContent = document.getElementById('result-content');
                    const generatedTitle = document.getElementById('generated-title');
                    
                    if (data.success) {
                        resultTitle.style.display = 'none';
                        resultContent.style.display = 'block';
                        generatedTitle.textContent = data.data.generated_title || '生成的论文标题';
                        
                        // 更新文献溯源模块
                        const citationResult = document.getElementById('citation-result');
                        citationResult.innerHTML = data.data.citation_analysis || '<p>文献分析结果将显示在这里</p>';
                        
                        // 更新逻辑审计模块
                        const logicResult = document.getElementById('logic-result');
                        logicResult.innerHTML = data.data.logic_analysis || '<p>逻辑分析结果将显示在这里</p>';
                    } else {
                        alert('请求失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('错误:', error);
                    alert('请求失败，请检查网络连接');
                });
            });
        }
    </script>

</body>

</html>
