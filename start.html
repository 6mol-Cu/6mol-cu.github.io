<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="智理校园" />
    <meta name="author" content="智理校园" />
    <title>从此开始 - 智理校园</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatability -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    
    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" style="position: absolute; top: 0; right: 0; width: 100%; z-index: 1000;">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">智理校园</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="index.html">主页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="start.html">从此开始</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Banner -->
    <div class="bg-blue-600 text-white py-4" style="background-color: #1E40AF; margin-top: 70px;">
        <div class="container px-5">
            <h1 class="text-center">Artificial Intelligence for campus</h1>
        </div>
    </div>

    <!-- Main Content -->
    <section class="py-5">
        <div class="container px-5">
            <div class="row">
                <!-- 左侧三分之二：格式审计模块 -->
                <div class="col-lg-8">
                    <div class="border rounded p-4 mb-0">
                        <h2>格式审计模块</h2>
                        
                        <!-- 输入区 -->
                        <div class="mb-4">
                            <!-- 学校名称 -->
                            <div class="mb-4">
                                <label for="school_name">学校名称：</label>
                                <select id="school_name" class="form-control">
                                    <option value="">请选择学校</option>
                                    <option value="北京大学">北京大学</option>
                                    <option value="清华大学">清华大学</option>
                                    <option value="中国人民大学">中国人民大学</option>
                                    <option value="北京师范大学">北京师范大学</option>
                                    <option value="北京理工大学">北京理工大学</option>
                                    <option value="北京航空航天大学">北京航空航天大学</option>
                                    <option value="北京科技大学">北京科技大学</option>
                                    <option value="北京交通大学">北京交通大学</option>
                                    <option value="北京邮电大学">北京邮电大学</option>
                                    <option value="北京化工大学">北京化工大学</option>
                                    <option value="中国农业大学">中国农业大学</option>
                                    <option value="北京林业大学">北京林业大学</option>
                                    <option value="北京中医药大学">北京中医药大学</option>
                                    <option value="中国政法大学">中国政法大学</option>
                                    <option value="华北电力大学">华北电力大学</option>
                                    <option value="北京工业大学">北京工业大学</option>
                                </select>
                            </div>

                            <!-- 处理模式 -->
                            <div class="mb-4">
                                <label for="process_mode">处理模式：</label>
                                <select id="process_mode" class="form-control">
                                    <option value="">请选择处理模式</option>
                                    <option value="论文排版">1. 论文排版</option>
                                    <option value="直接生成">2. 直接生成（不录入学校）</option>
                                    <option value="特定学校">3. 特定学校</option>
                                </select>
                            </div>

                            <!-- 论文类型 -->
                            <div class="mb-4">
                                <label for="paper_type">论文类型：</label>
                                <input type="text" id="paper_type" class="form-control" placeholder="如：硕士论文、博士论文等">
                            </div>

                            <!-- 修改方向 -->
                            <div class="mb-4">
                                <label for="rewrite_mode">修改方向：</label>
                                <select id="rewrite_mode" class="form-control">
                                    <option value="">请选择修改方向</option>
                                    <option value="轻度优化">轻度优化（保留原文）</option>
                                    <option value="深度优化">深度优化（允许补充）</option>
                                </select>
                            </div>

                            <!-- 正文内容 -->
                            <div class="mb-4">
                                <label for="paper_content">正文内容：</label>
                                <textarea id="paper_content" class="form-control" rows="5" placeholder="请输入论文正文内容"></textarea>
                            </div>

                            <!-- 上传论文文件 -->
                            <div class="mb-4">
                                <label for="paper_file">上传论文文件：</label>
                                <input type="file" id="paper_file" class="form-control" accept=".txt,.doc,.docx,.pdf">
                            </div>

                            <!-- 补充要求 -->
                            <div class="mb-4">
                                <label for="extra_requirements">补充要求：</label>
                                <textarea id="extra_requirements" class="form-control" rows="3" placeholder="请输入额外的要求或说明"></textarea>
                            </div>

                            <!-- 开始分析按钮 -->
                            <button id="start-analysis-btn" class="btn btn-primary">开始分析</button>
                        </div>
                        
                        <!-- 展示区 -->
                        <div class="border rounded p-4 mb-0">
                            <h3>分析结果</h3>
                            <div id="result-container" class="mt-2">
                                <p>等待分析...</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧三分之一：文献溯源模块和逻辑审计模块 -->
                <div class="col-lg-4">
                    <!-- 文献溯源模块 -->
                    <div class="border rounded p-4 mb-0">
                        <h3>文献溯源模块</h3>
                        <div id="citation-result" class="p-2">
                            <!-- 待机界面 -->
                            <p>等待分析...</p>
                        </div>
                    </div>
                    
                    <!-- 逻辑审计模块 -->
                    <div class="border rounded p-4 mt-4 mb-0">
                        <h3>逻辑审计模块</h3>
                        <div id="logic-result" class="p-2">
                            <!-- 待机界面 -->
                            <p>等待分析...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div class="mb-2">许嘉杭、李泽宇、马海冀、闫澄、王灏曦</div>
            </div>
        </div>
    </footer>

    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 获取按钮和结果容器
            const startBtn = document.getElementById('start-analysis-btn');
            const resultContainer = document.getElementById('result-container');

            // 添加点击事件监听
            startBtn.addEventListener('click', async function() {
                // 获取表单数据
                const school_name = document.getElementById('school_name').value;
                const process_mode = document.getElementById('process_mode').value;
                const paper_type = document.getElementById('paper_type').value;
                const rewrite_mode = document.getElementById('rewrite_mode').value;
                const paper_content = document.getElementById('paper_content').value;
                const extra_requirements = document.getElementById('extra_requirements').value;

                // 验证必填字段
                if (!process_mode) {
                    alert('请选择处理模式');
                    return;
                }

                // 如果处理模式是"特定学校"，则必须选择学校
                if (process_mode === '特定学校' && !school_name) {
                    alert('请选择学校');
                    return;
                }

                // 更新结果容器显示加载状态
                resultContainer.innerHTML = '<p>正在分析中...</p>';

                try {
                    // 发送请求到API端点
                    const response = await fetch('/api/run-workflow', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: {
                                school_name: school_name || null,
                                process_mode: process_mode,
                                paper_type: paper_type || null,
                                rewrite_mode: rewrite_mode || null,
                                paper_content: paper_content || null,
                                extra_requirements: extra_requirements || null
                            },
                            user: 'frontend-user'
                        })
                    });

                    // 检查 HTTP 状态码
                    if (!response.ok) {
                        resultContainer.innerHTML = '<p>请求失败，HTTP状态码: ' + response.status + '</p>';
                        return;
                    }

                    // 解析响应
                    const data = await response.json();
                    console.log('API响应:', data);

                    // 显示结果
                    if (data.success === true) {
                        resultContainer.innerHTML = '<p>' + (data.data || '分析完成') + '</p>';
                        
                        // 更新文献溯源模块
                        const citationResult = document.getElementById('citation-result');
                        citationResult.innerHTML = data.data?.citation_analysis || data.data?.output || '<p>文献分析结果将显示在这里</p>';
                        
                        // 更新逻辑审计模块
                        const logicResult = document.getElementById('logic-result');
                        logicResult.innerHTML = data.data?.logic_analysis || data.data?.output || '<p>逻辑分析结果将显示在这里</p>';
                    } else {
                        // 显示详细的错误信息
                        const errorMsg = data.message || data.error || '未知错误';
                        resultContainer.innerHTML = '<p>分析失败: ' + errorMsg + '</p>';
                    }
                } catch (error) {
                    // 处理错误
                    console.error('请求失败:', error);
                    resultContainer.innerHTML = '<p>请求失败: ' + error.message + '</p>';
                }
            });
        });
    </script>

</body>

</html>
